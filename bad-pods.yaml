apiVersion: v1
kind: Pod
metadata:
  name: crashloop-pod
spec:
  restartPolicy: Always
  containers:
    - name: crashloop
      image: busybox
      command: ["/bin/sh", "-c", "echo crash; exit 1"]

---
apiVersion: v1
kind: Pod
metadata:
  name: imagepullbackoff-pod
spec:
  restartPolicy: Always
  containers:
    - name: badimage
      image: busybox:nonexistent-tag

---
apiVersion: v1
kind: Pod
metadata:
  name: pending-pod
spec:
  restartPolicy: Always
  containers:
    - name: pending
      image: busybox
      command: ["/bin/sh", "-c", "sleep 3600"]
  nodeSelector:
    impossible: "true"
